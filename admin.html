<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROMA Admin | لوحة الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-header {
            padding: 20px;
            background: var(--bg-darker);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-container {
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .device-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
            background: var(--glass-bg);
            margin-bottom: 10px;
            border-radius: 8px;
        }
        .device-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        .btn-small {
            padding: 8px 15px;
            font-size: 0.9rem;
        }
        .btn-success { background: rgba(0, 230, 118, 0.2); color: var(--success); border: 1px solid var(--success); }
        .btn-danger { background: rgba(255, 23, 68, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        
        .btn-success:hover { background: var(--success); color: #000; }
        .btn-danger:hover { background: var(--danger); color: #fff; }

        /* Login UI */
        .login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 { margin-bottom: 25px; }
        .error-msg { color: var(--danger); margin-top: 15px; display: none; font-size: 0.95rem; font-weight: bold;}
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .admin-tabs .btn { flex: 1; opacity: 0.7; }
        .admin-tabs .btn.active-tab, .admin-tabs .btn:hover { opacity: 1; }
        .timer-controls { display: flex; gap: 5px; align-items: center; margin-top: 10px; }
        .timer-controls input { width: 60px; padding: 5px; border-radius: 5px; border: 1px solid var(--glass-border); background: var(--bg-main); color: white; }
        .timer-display { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--accent-neon); margin-top: 5px; }
        
        .booking-card { background: var(--glass-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--glass-border); margin-bottom: 15px; }
        .booking-card h4 { margin-bottom: 10px; color: var(--accent-neon); }
        .booking-card p { margin-bottom: 5px; font-size: 0.9rem; }
        .booking-actions { display: flex; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="admin-header">
        <a href="index.html" class="logo">R<span>O</span>MA <span>ADMIN</span></a>
        <div>
            <button id="logout-btn" class="btn btn-danger btn-small" style="display:none; margin-left:10px;">تسجيل الخروج</button>
            <a href="index.html" class="btn btn-primary btn-small">العودة للموقع</a>
        </div>
    </div>

    <!-- Login Section -->
    <div id="login-section" class="login-section">
        <div class="login-card">
            <h2>تسجيل الدخول للإدارة</h2>
            <form id="admin-login-form">
                <div class="form-group">
                    <input type="email" id="admin-email" required placeholder="البريد الإلكتروني">
                </div>
                <div class="form-group">
                    <input type="password" id="admin-password" required placeholder="كلمة المرور">
                </div>
                <button type="submit" class="btn btn-primary btn-block">دخول</button>
                <div id="login-error" class="error-msg">البريد الإلكتروني أو كلمة المرور غير صحيحة.</div>
            </form>
        </div>
    </div>

    <!-- Admin Section (Hidden by default) -->
    <div id="admin-section" class="admin-container" style="display: none;">
        
        <div class="admin-tabs">
            <button class="btn btn-primary active-tab" onclick="document.getElementById('devices-tab').style.display='block'; document.getElementById('bookings-tab').style.display='none';">إدارة الأجهزة</button>
            <button class="btn btn-primary" onclick="document.getElementById('devices-tab').style.display='none'; document.getElementById('bookings-tab').style.display='block';">إدارة الحجوزات</button>
        </div>

        <div id="devices-tab">
            <h2>إدارة الأجهزة والعدادات</h2>
            <p class="text-muted" style="margin-bottom: 30px;">قم بتعيين وقت للأجهزة وحالتها، وستتحدث تلقائياً للزوار.</p>
            <div id="admin-devices-list">
                <!-- Injected via JS -->
            </div>
        </div>

        <div id="bookings-tab" style="display: none; margin-top: 20px;">
            <h2>إدارة الحجوزات المسبقة</h2>
            <p class="text-muted" style="margin-bottom: 30px;">قم بتأكيد الدفع للحجوزات لتفعيلها في وقتها.</p>
            <div id="admin-bookings-list">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
